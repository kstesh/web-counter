type: mongocluster     # memory | file | postgres | mongo | cassandra | mongocluster
file_path: counter.txt

postgres:
  host: host.docker.internal
  port: 5433
  dbname: counter_db
  user: counter_user
  password: counter_pass
  minconn: 5
  maxconn: 100

mongo:
  host: host.docker.internal
  port: 27017
  user: admin
  password: admin123

cassandra:
  host: host.docker.internal
  port: 9042
  keyspace: counter_db

mongocluster:
  hosts: "mongo1:27017,mongo2:27017,mongo3:27017"
  replica_set: myReplicaSet
  write_concern: 1   # 1 | "majority"